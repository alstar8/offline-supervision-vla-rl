<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 420" role="img" aria-label="Training curves for IND and OOD success">
  <rect width="1200" height="420" rx="18" fill="#ffffff" stroke="#cbd5e1"/>
  <text x="310" y="34" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="18" font-weight="700" fill="#0f172a">IND Success</text>
  <text x="890" y="34" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="18" font-weight="700" fill="#0f172a">OOD Success (avg)</text>

  <g transform="translate(60 60)">
    <rect x="0" y="0" width="500" height="320" fill="#f8fafc" stroke="#e2e8f0" rx="12"/>
    <line x1="50" y1="270" x2="470" y2="270" stroke="#94a3b8"/>
    <line x1="50" y1="30" x2="50" y2="270" stroke="#94a3b8"/>
    <text x="260" y="305" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="12" fill="#64748b">Environment steps (×10v)</text>
    <text x="18" y="150" transform="rotate(-90 18 150)" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="12" fill="#64748b">Success</text>
    <polyline fill="none" stroke="#64748b" stroke-width="3" stroke-dasharray="8 6" points="50,120 470,55"/>
    <polyline fill="none" stroke="#16a34a" stroke-width="3" points="50,220 470,95"/>
    <polyline fill="none" stroke="#0891b2" stroke-width="4" points="50,210 260,70 470,58"/>
    <polyline fill="none" stroke="#a855f7" stroke-width="3" points="50,215 470,85"/>
    <text x="380" y="70" font-family="Inter, Arial, sans-serif" font-size="12" fill="#0891b2">RefKL</text>
    <text x="380" y="88" font-family="Inter, Arial, sans-serif" font-size="12" fill="#a855f7">DataBC</text>
    <text x="380" y="106" font-family="Inter, Arial, sans-serif" font-size="12" fill="#16a34a">PPO</text>
  </g>

  <g transform="translate(640 60)">
    <rect x="0" y="0" width="500" height="320" fill="#f8fafc" stroke="#e2e8f0" rx="12"/>
    <line x1="50" y1="270" x2="470" y2="270" stroke="#94a3b8"/>
    <line x1="50" y1="30" x2="50" y2="270" stroke="#94a3b8"/>
    <polyline fill="none" stroke="#64748b" stroke-width="3" stroke-dasharray="8 6" points="50,150 470,70"/>
    <polyline fill="none" stroke="#16a34a" stroke-width="3" points="50,250 470,130"/>
    <polyline fill="none" stroke="#0891b2" stroke-width="4" points="50,240 260,110 470,72"/>
    <polyline fill="none" stroke="#a855f7" stroke-width="3" points="50,245 470,95"/>
  </g>
</svg>
