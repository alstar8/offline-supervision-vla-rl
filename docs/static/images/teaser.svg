<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 420" role="img" aria-label="Hybrid offline-online RL for VLA models">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ecfeff"/>
      <stop offset="100%" stop-color="#f8fafc"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="420" rx="18" fill="url(#bg)" stroke="#cbd5e1"/>
  <text x="600" y="42" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="24" font-weight="700" fill="#0f172a">Hybrid OfflineOnline RL Fine-Tuning</text>

  <rect x="60" y="90" width="250" height="120" rx="14" fill="#dbeafe" stroke="#2563eb"/>
  <text x="185" y="130" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="18" font-weight="700" fill="#1e3a8a">Offline SFT</text>
  <text x="185" y="160" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="14" fill="#334155">Demonstrations</text>
  <text x="185" y="185" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="14" fill="#334155">Reference policy</text>

  <rect x="445" y="90" width="310" height="120" rx="14" fill="#cffafe" stroke="#0891b2"/>
  <text x="600" y="130" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="18" font-weight="700" fill="#155e75">Guided PPO</text>
  <text x="600" y="160" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="14" fill="#334155">RefKL or DataBC auxiliary loss</text>
  <text x="600" y="185" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="14" fill="#334155">˛ curriculum during online RL</text>

  <rect x="890" y="90" width="250" height="120" rx="14" fill="#dcfce7" stroke="#16a34a"/>
  <text x="1015" y="130" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="18" font-weight="700" fill="#14532d">OpenVLA + LoRA</text>
  <text x="1015" y="160" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="14" fill="#334155">Frozen backbone</text>
  <text x="1015" y="185" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="14" fill="#334155">Strong IND / OOD policy</text>

  <path d="M310 150 H430" stroke="#64748b" stroke-width="4" marker-end="url(#arrow)"/>
  <path d="M755 150 H875" stroke="#64748b" stroke-width="4" marker-end="url(#arrow)"/>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#64748b"/>
    </marker>
  </defs>

  <rect x="180" y="260" width="840" height="110" rx="14" fill="#ffffff" stroke="#e2e8f0"/>
  <text x="600" y="295" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="16" font-weight="700" fill="#0f172a">Key idea: offline supervision inside the RL objective  not only as initialization</text>
  <text x="600" y="325" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="14" fill="#475569">RefKL at 1M steps H standard PPO at 2M steps · ~50% fewer environment interactions · OOD preserved</text>
  <text x="600" y="352" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="13" fill="#64748b">RL4VLA benchmark · PutOnPlateInScene25 · OpenVLA-warmup + LoRA</text>
</svg>
